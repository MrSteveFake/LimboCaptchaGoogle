name: Build LimboCaptcha

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Create directories
      run: |
        mkdir -p libs
        mkdir -p build/classes
        mkdir -p build/merged
    
    - name: Download dependencies
      run: |
        wget -q -O libs/velocity-api.jar https://repo.papermc.io/repository/maven-public/com/velocitypowered/velocity-api/3.4.0/velocity-api-3.4.0.jar
        wget -q -O libs/adventure-api.jar https://repo1.maven.org/maven2/net/kyori/adventure-api/4.16.0/adventure-api-4.16.0.jar
        wget -q -O libs/adventure-text-serializer-legacy.jar https://repo1.maven.org/maven2/net/kyori/adventure-text-serializer-legacy/4.16.0/adventure-text-serializer-legacy-4.16.0.jar
        wget -q -O libs/slf4j-api.jar https://repo1.maven.org/maven2/org/slf4j/slf4j-api/2.0.9/slf4j-api-2.0.9.jar
    
    - name: Compile Java
      run: |
        find . -name "*.java" -path "*/src/*" > sources.txt
        CLASSPATH=""
        for jar in libs/*.jar; do
          CLASSPATH="$CLASSPATH:$jar"
        done
        javac -d build/classes -cp "${CLASSPATH#:}" @sources.txt
        rm sources.txt
    
    - name: Copy resources
      run: |
        cp -r resources/* build/classes/ 2>/dev/null || echo "Resources copied"
    
    - name: Create JAR
      run: |
        cd build/merged
        for jar in ../../libs/*.jar; do
          jar xf "$jar"
        done
        cd ../..
        cd build/classes
        jar cf ../temp.jar *
        cd ../..
        cd build/merged
        jar xf ../temp.jar
        rm -rf META-INF
        rm -f module-info.class
        jar cf ../LimboCaptcha.jar *
        cd ../..
        rm -rf build/classes build/merged build/temp.jar
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: LimboCaptcha
        path: build/LimboCaptcha.jar
        retention-days: 90
