name: Build LimboCaptcha

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Debug - Show ALL files
      run: |
        echo "=== ПОЛНОЕ ДЕРЕВО ФАЙЛОВ ==="
        find . -type f | sort
        echo ""
        echo "=== СОДЕРЖИМОЕ КОРНЯ ==="
        ls -la
    
    - name: Create directories
      run: |
        mkdir -p libs
        mkdir -p build
    
    - name: Download dependencies
      run: |
        wget -q -O libs/velocity-api.jar https://repo.papermc.io/repository/maven-public/com/velocitypowered/velocity-api/3.4.0/velocity-api-3.4.0.jar
        wget -q -O libs/adventure-api.jar https://repo1.maven.org/maven2/net/kyori/adventure-api/4.16.0/adventure-api-4.16.0.jar
        wget -q -O libs/adventure-legacy.jar https://repo1.maven.org/maven2/net/kyori/adventure-text-serializer-legacy/4.16.0/adventure-text-serializer-legacy-4.16.0.jar
        wget -q -O libs/slf4j-api.jar https://repo1.maven.org/maven2/org/slf4j/slf4j-api/2.0.9/slf4j-api-2.0.9.jar
        echo "Библиотеки скачаны:"
        ls -la libs/
    
    - name: Manual compile
      run: |
        echo "Поиск Java файлов..."
        JAVA_FILES=$(find . -name "*.java" -type f)
        echo "$JAVA_FILES"
        
        if [ -z "$JAVA_FILES" ]; then
          echo "ОШИБКА: Java файлы не найдены!"
          echo "Проверьте что файлы загружены в репозиторий"
          exit 1
        fi
        
        echo ""
        echo "Компиляция..."
        # Собираем classpath
        CP=""
        for jar in libs/*.jar; do
          CP="$CP:$jar"
        done
        
        # Компилируем каждый файл отдельно
        for file in $JAVA_FILES; do
          echo "  Компиляция: $file"
          javac -d build -cp "${CP#:}" "$file"
        done
        
        echo "Компиляция завершена!"
    
    - name: Find and copy resources
      run: |
        echo "Поиск plugin.json..."
        find . -name "velocity-plugin.json" -type f
        
        echo "Поиск config.yml..."
        find . -name "config.yml" -type f
        
        # Копируем plugin.json
        PLUGIN_JSON=$(find . -name "velocity-plugin.json" -type f | head -1)
        if [ -n "$PLUGIN_JSON" ]; then
          cp "$PLUGIN_JSON" build/
          echo "Скопирован: $PLUGIN_JSON"
        fi
        
        # Копируем config.yml
        CONFIG_YML=$(find . -name "config.yml" -type f | head -1)
        if [ -n "$CONFIG_YML" ]; then
          cp "$CONFIG_YML" build/
          echo "Скопирован: $CONFIG_YML"
        fi
    
    - name: Create JAR
      run: |
        cd build
        jar cf LimboCaptcha.jar *
        cd ..
        ls -lh build/LimboCaptcha.jar
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: LimboCaptcha
        path: build/LimboCaptcha.jar
        retention-days: 90
